<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turkish Airlines — Current Fleet</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E31837;
    --dark: #0a0a0a;
    --surface: #111111;
    --card: #181818;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #777;
    --accent: #E31837;
    --gold: #c9a84c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--dark);
    border-bottom: 2px solid var(--red);
    padding: 0 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-tulip {
    width: 36px;
    height: 36px;
  }

  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--text);
  }

  .logo-text span { color: var(--red); }

  .header-stats {
    display: flex;
    gap: 32px;
  }

  .stat-item {
    text-align: right;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: var(--red);
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* CONTROLS */
  .controls {
    padding: 20px 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .search-box {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 320px;
  }

  .search-box input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px 8px 36px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--red); }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
  }

  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }

  .result-count {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .result-count span { color: var(--red); font-weight: 600; }

  /* TABLE */
  .table-wrapper {
    overflow-x: auto;
    padding: 0 32px 40px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }

  thead th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    background: var(--surface);
    position: sticky;
    top: 64px;
  }

  thead th:hover { color: var(--red); }
  thead th.sorted { color: var(--red); }

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.1s;
  }

  tbody tr:hover { background: rgba(227,24,55,0.06); }

  tbody td {
    padding: 9px 14px;
    vertical-align: middle;
    white-space: nowrap;
  }

  .reg {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--red);
    letter-spacing: 1px;
  }

  .aircraft-type {
    color: var(--text);
    font-weight: 500;
  }

  .config-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    padding: 2px 7px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .delivered {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #888;
  }

  .remark {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .remark.maintenance { color: #e8a020; }
  .remark.parked { color: #e8a020; }
  .remark.cargo { color: #5b9bd5; }
  .remark.special { color: var(--gold); }
  .remark.order { color: #888; }

  .aircraft-name {
    font-size: 12px;
    color: #aaa;
  }

  .age-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 110px;
  }

  .age-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 52px;
    text-align: right;
  }

  .age-bar {
    height: 3px;
    background: var(--border);
    flex: 1;
    min-width: 50px;
    position: relative;
  }

  .age-fill {
    height: 100%;
    background: var(--red);
    transition: width 0.3s;
  }

  /* TYPE CATEGORY ROWS */
  .type-header {
    background: var(--surface);
  }

  .type-header td {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--red);
    padding: 14px 14px 6px;
    border-top: 1px solid var(--border);
  }

  /* ON ORDER */
  tbody tr.on-order td { opacity: 0.5; }
  tbody tr.on-order .reg { color: var(--muted); }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 11px;
    border-top: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
  }

  footer span { color: var(--red); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--red); }

  /* PHOTO PANEL */
  .panel-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    backdrop-filter: blur(2px);
  }
  .panel-overlay.open { opacity: 1; pointer-events: all; }

  .photo-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 380px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 201;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .photo-panel.open { transform: translateX(0); }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--card);
  }

  .panel-reg {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--red);
    letter-spacing: 2px;
  }

  .panel-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .panel-close:hover { border-color: var(--red); color: var(--red); }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  /* Main photo */
  .panel-photo-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    overflow: hidden;
  }

  .panel-photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.3s;
  }

  .panel-photo-credit {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    padding: 20px 12px 8px;
    font-size: 10px;
    color: rgba(255,255,255,0.7);
    font-family: 'IBM Plex Mono', monospace;
  }

  .panel-photo-credit a {
    color: var(--red);
    text-decoration: none;
  }

  /* Photo grid (thumbnails) */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    padding: 2px;
    background: var(--dark);
  }

  .photo-thumb {
    aspect-ratio: 16/9;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    opacity: 0.7;
    transition: opacity 0.15s;
  }

  .photo-thumb:hover, .photo-thumb.active { opacity: 1; }
  .photo-thumb.active::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 2px solid var(--red);
  }

  .photo-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Aircraft info */
  .panel-info {
    padding: 16px 20px;
  }

  .panel-aircraft-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text);
    margin-bottom: 4px;
  }

  .panel-type {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .info-item {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 10px 12px;
  }

  .info-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .info-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .info-value.red { color: var(--red); }
  .info-value.gold { color: var(--gold); }

  /* Planespotters link */
  .panel-link {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 20px 16px;
    padding: 10px 14px;
    background: rgba(227,24,55,0.08);
    border: 1px solid rgba(227,24,55,0.2);
    color: var(--red);
    text-decoration: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    transition: background 0.15s;
  }
  .panel-link:hover { background: rgba(227,24,55,0.15); }

  /* Loading / error states */
  .panel-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 20px;
    gap: 16px;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .panel-loading-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .panel-no-photo {
    padding: 32px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }

  .panel-no-photo .no-photo-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  /* Clickable rows */
  tbody tr:not(.type-header):not(.on-order) { cursor: pointer; }
  tbody tr.selected-row { background: rgba(227,24,55,0.1) !important; }
  .aircraft-card { cursor: pointer; }
  .aircraft-card.selected-card { background: rgba(227,24,55,0.1); border-left-color: #fff !important; }

  /* Panel mobile full screen */
  @media (max-width: 768px) {
    .photo-panel {
      width: 100%;
      top: 0;
    }
    .panel-header { padding: 14px 16px; }
    .info-grid { grid-template-columns: 1fr 1fr; }
  }

  /* MOBILE STATS BAR */
  .mobile-stats {
    display: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    justify-content: space-around;
  }

  .mobile-stats .stat-item {
    text-align: center;
  }

  /* MOBILE CARD VIEW */
  .card-view { display: none; }

  .aircraft-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--red);
    padding: 12px 14px;
    margin-bottom: 8px;
    transition: border-color 0.15s;
  }

  .aircraft-card:active { border-left-color: #fff; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }

  .card-reg {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--red);
    letter-spacing: 1.5px;
  }

  .card-age {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: rgba(255,255,255,0.05);
    padding: 2px 7px;
  }

  .card-type {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
  }

  .card-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  .card-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    padding: 2px 6px;
    color: var(--muted);
  }

  .card-name {
    font-size: 11px;
    color: #aaa;
    margin-top: 4px;
    font-style: italic;
  }

  .card-remark {
    font-size: 11px;
    margin-top: 3px;
  }

  /* MOBILE FILTER SCROLL */
  @media (max-width: 768px) {
    header { padding: 0 12px; height: 56px; }
    .header-stats { display: none; }
    .mobile-stats { display: flex; }
    .logo-text { font-size: 16px; letter-spacing: 1.5px; }
    .logo-emblem { width: 32px; height: 32px; }

    .controls {
      padding: 10px 12px;
      gap: 8px;
      flex-direction: column;
      align-items: stretch;
    }

    .search-box { max-width: 100%; min-width: unset; }

    .filter-group {
      overflow-x: auto;
      flex-wrap: nowrap;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }

    .filter-group::-webkit-scrollbar { height: 2px; }

    .result-count { margin-left: 0; font-size: 11px; }

    /* Hide table, show cards */
    .table-wrapper { display: none; }
    .card-view {
      display: block;
      padding: 12px 12px 40px;
    }
  }

  @media (max-width: 480px) {
    .logo-text { display: none; }
    .logo-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      letter-spacing: 2px;
      color: var(--text);
    }
    .logo-brand span { color: var(--red); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <!-- THY Official Tulip Emblem -->
    <svg class="logo-emblem" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:44px;height:44px;flex-shrink:0">
      <!-- Red circle background -->
      <circle cx="60" cy="60" r="58" fill="#E31837"/>
      <!-- Main tulip body - center petal -->
      <path d="M60 18 C60 18 52 30 50 42 C48 54 52 64 60 68 C68 64 72 54 70 42 C68 30 60 18 60 18Z" fill="white"/>
      <!-- Left petal -->
      <path d="M60 40 C60 40 46 36 38 42 C30 48 30 58 36 64 C42 70 52 68 58 62" fill="white"/>
      <!-- Right petal -->
      <path d="M60 40 C60 40 74 36 82 42 C90 48 90 58 84 64 C78 70 68 68 62 62" fill="white"/>
      <!-- Stem -->
      <rect x="57.5" y="66" width="5" height="28" rx="2.5" fill="white"/>
      <!-- Leaves -->
      <path d="M60 80 C60 80 48 76 44 68 C42 63 46 59 52 62 C56 64 59 70 60 75" fill="white"/>
      <path d="M60 80 C60 80 72 76 76 68 C78 63 74 59 68 62 C64 64 61 70 60 75" fill="white"/>
    </svg>
    <div class="logo-text">TURKISH <span>AIRLINES</span> <span style="color:var(--muted);font-size:14px">— FLEET</span></div>
    <div class="logo-brand" style="display:none">TK <span>FLEET</span></div>
  </div>
  <div class="header-stats">
    <div class="stat-item">
      <div class="stat-num" id="total-count">—</div>
      <div class="stat-label">Total Aircraft</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="type-count">—</div>
      <div class="stat-label">Aircraft Types</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="avg-age">—</div>
      <div class="stat-label">Avg Age (yrs)</div>
    </div>
  </div>
</header>

<!-- Mobile stats bar -->
<div class="mobile-stats">
  <div class="stat-item">
    <div class="stat-num" id="total-count-m">—</div>
    <div class="stat-label">Uçak</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="type-count-m">—</div>
    <div class="stat-label">Tip</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="avg-age-m">—</div>
    <div class="stat-label">Ort. Yaş</div>
  </div>
</div>

<div class="controls">
  <div class="search-box">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="REG, tip, isim ara...">
  </div>
  <div class="filter-group" id="type-filters">
    <button class="filter-btn active" data-filter="all">Tümü</button>
    <button class="filter-btn" data-filter="A319">A319</button>
    <button class="filter-btn" data-filter="A320">A320</button>
    <button class="filter-btn" data-filter="A321">A321</button>
    <button class="filter-btn" data-filter="A321neo">A321neo</button>
    <button class="filter-btn" data-filter="A330">A330</button>
    <button class="filter-btn" data-filter="A350">A350</button>
    <button class="filter-btn" data-filter="B737">B737</button>
    <button class="filter-btn" data-filter="B777">B777</button>
    <button class="filter-btn" data-filter="B787">B787</button>
    <button class="filter-btn" data-filter="Cargo">Cargo</button>
  </div>
  <div class="result-count"><span id="shown-count">—</span> uçak gösteriliyor</div>
</div>

<div class="table-wrapper">
  <table id="fleet-table">
    <thead>
      <tr>
        <th data-col="reg">REG</th>
        <th data-col="type">TİP</th>
        <th data-col="config">KONFİG</th>
        <th data-col="delivered">TESLİM</th>
        <th data-col="remark">AÇIKLAMA</th>
        <th data-col="name">İSİM</th>
        <th data-col="age">YAŞ</th>
      </tr>
    </thead>
    <tbody id="fleet-body"></tbody>
  </table>
</div>

<div class="card-view" id="card-view"></div>

<footer>
  Veri kaynağı: Planespotters.net &nbsp;|&nbsp; <span>Turkish Airlines Current Fleet</span> &nbsp;|&nbsp; © 2026
</footer>

<!-- PHOTO PANEL OVERLAY -->
<div class="panel-overlay" id="panel-overlay"></div>

<!-- PHOTO PANEL -->
<div class="photo-panel" id="photo-panel">
  <div class="panel-header">
    <div>
      <div class="panel-reg" id="panel-reg">—</div>
      <div style="font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:2px" id="panel-subtype">—</div>
    </div>
    <button class="panel-close" id="panel-close">✕</button>
  </div>
  <div class="panel-body" id="panel-body">
    <div class="panel-loading">
      <div class="spinner"></div>
      <div class="panel-loading-text">FOTOĞRAF YÜKLENİYOR...</div>
    </div>
  </div>
</div>

<script>
window.fleetData = [
  // PAGE 1 — A330-200F Cargo
  {reg:"TC-JCI",type:"Airbus A330-200F",config:"Cargo",delivered:"Aug 2013",remark:"opf Turkish Cargo",name:"Kervan",age:12.7},
  {reg:"TC-JDO",type:"Airbus A330-200F",config:"Cargo",delivered:"Sep 2010",remark:"opf Turkish Cargo",name:"Meriç",age:16.4},

const maxAge = Math.max(...window.fleetData.filter(a=>!a.onOrder).map(a=>a.age));

function getRemarkClass(remark) {
  if (!remark) return '';
  const r = remark.toLowerCase();
  if (r.includes('parked') || r.includes('maintenance')) return 'parked';
  if (r.includes('opf turkish cargo') || r.includes('cargo')) return 'cargo';
  if (r.includes('star alliance') || r.includes('special') || r.includes('cs') || r.includes('retro') || r.includes('bio fuel') || r.includes('anniversary') || r.includes('türkiye') || r.includes('500th') || r.includes('400th') || r.includes('6000th') || r.includes('holidays')) return 'special';
  if (r.includes('on order')) return 'order';
  if (r.includes('lsd') || r.includes('isd')) return 'order';
  return '';
}

function getTypeKey(type) {
  if (type.includes('A319')) return 'A319';
  if (type.includes('A320')) return 'A320';
  if (type.includes('A321neo')) return 'A321neo';
  if (type.includes('A321')) return 'A321';
  if (type.includes('A330')) return 'A330';
  if (type.includes('A350')) return 'A350';
  if (type.includes('777F') || type.includes('A330-200F')) return 'Cargo';
  if (type.includes('737')) return 'B737';
  if (type.includes('777')) return 'B777';
  if (type.includes('787')) return 'B787';
  return 'Other';
}

let currentFilter = 'all';
let currentSearch = '';
let sortCol = 'type';
let sortDir = 1;

function getFilteredData() {
  return window.fleetData.filter(a => {
    const typeKey = getTypeKey(a.type);
    const matchFilter = currentFilter === 'all' || typeKey === currentFilter || (currentFilter === 'Cargo' && a.config === 'Cargo');
    const q = currentSearch.toLowerCase();
    const matchSearch = !q ||
      a.reg.toLowerCase().includes(q) ||
      a.type.toLowerCase().includes(q) ||
      (a.name && a.name.toLowerCase().includes(q)) ||
      a.config.toLowerCase().includes(q) ||
      (a.remark && a.remark.toLowerCase().includes(q));
    return matchFilter && matchSearch;
  });
}

window.render = function render() {
  const data = getFilteredData();
  const sorted = [...data].sort((a,b) => {
    let av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
    if (sortCol === 'age') { av = a.age; bv = b.age; }
    if (av < bv) return -sortDir;
    if (av > bv) return sortDir;
    return 0;
  });

  const tbody = document.getElementById('fleet-body');
  tbody.innerHTML = '';

  let lastType = '';
  sorted.forEach(ac => {
    const tk = getTypeKey(ac.type);
    if (ac.type !== lastType && sortCol === 'type') {
      const hr = document.createElement('tr');
      hr.className = 'type-header';
      hr.innerHTML = `<td colspan="7">✈ ${ac.type}</td>`;
      tbody.appendChild(hr);
      lastType = ac.type;
    }

    const tr = document.createElement('tr');
    if (ac.onOrder) tr.classList.add('on-order');
    if (!ac.onOrder) {
      tr.dataset.reg = ac.reg;
      tr.addEventListener('click', () => openPanel(ac));
    }

    const ageBarPct = ac.age > 0 ? Math.min(100, (ac.age / maxAge) * 100) : 0;
    const remarkClass = getRemarkClass(ac.remark || '');
    const ageColor = ac.age > 15 ? '#e8a020' : ac.age < 2 ? '#5b9bd5' : '#E31837';

    tr.innerHTML = `
      <td><span class="reg">${ac.reg}</span></td>
      <td class="aircraft-type">${ac.type}</td>
      <td><span class="config-badge">${ac.config}</span></td>
      <td class="delivered">${ac.delivered}</td>
      <td><span class="remark ${remarkClass}">${ac.remark || '—'}</span></td>
      <td class="aircraft-name">${ac.name || '—'}</td>
      <td>
        <div class="age-bar-wrap">
          <span class="age-val">${ac.age > 0 ? ac.age.toFixed(1) + ' yr' : ac.onOrder ? 'order' : '—'}</span>
          <div class="age-bar"><div class="age-fill" style="width:${ageBarPct}%;background:${ageColor}"></div></div>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });

  const shownActive = sorted.filter(a=>!a.onOrder).length;
  document.getElementById('shown-count').textContent = shownActive;

  // Update header stats
  const active = window.fleetData.filter(a => !a.onOrder);
  const types = new Set(active.map(a => a.type));
  const avgAge = (active.reduce((s,a) => s + a.age, 0) / active.length).toFixed(1);
  document.getElementById('total-count').textContent = active.length;
  document.getElementById('type-count').textContent = types.size;
  document.getElementById('avg-age').textContent = avgAge;
  // Mobile stats
  document.getElementById('total-count-m').textContent = active.length;
  document.getElementById('type-count-m').textContent = types.size;
  document.getElementById('avg-age-m').textContent = avgAge;

  // Mobile card view
  const cardView = document.getElementById('card-view');
  cardView.innerHTML = '';
  sorted.forEach(ac => {
    const remarkClass = getRemarkClass(ac.remark || '');
    const ageColor = ac.age > 15 ? '#e8a020' : ac.age < 2 ? '#5b9bd5' : 'var(--red)';
    const card = document.createElement('div');
    card.className = 'aircraft-card' + (ac.onOrder ? ' on-order' : '');
    card.style.borderLeftColor = ac.onOrder ? 'var(--muted)' : ageColor;
    if (!ac.onOrder) {
      card.dataset.reg = ac.reg;
      card.addEventListener('click', () => openPanel(ac));
    }
    card.innerHTML = `
      <div class="card-top">
        <span class="card-reg">${ac.reg}</span>
        <span class="card-age">${ac.age > 0 ? ac.age.toFixed(1) + ' yr' : ac.onOrder ? 'On Order' : '—'}</span>
      </div>
      <div class="card-type">${ac.type}</div>
      ${ac.name ? `<div class="card-name">✦ ${ac.name}</div>` : ''}
      <div class="card-meta">
        ${ac.config ? `<span class="card-tag">${ac.config}</span>` : ''}
        <span class="card-tag">${ac.delivered}</span>
        ${ac.remark ? `<span class="card-tag card-remark ${remarkClass}">${ac.remark}</span>` : ''}
      </div>
    `;
    cardView.appendChild(card);
  });
}

const panel      = document.getElementById('photo-panel');
const overlay    = document.getElementById('panel-overlay');
const panelBody  = document.getElementById('panel-body');
const panelReg   = document.getElementById('panel-reg');
const panelSub   = document.getElementById('panel-subtype');
const panelClose = document.getElementById('panel-close');

let currentPhotos = [];
let activePhotoIdx = 0;
let selectedReg = null;

function openPanel(ac) {
  selectedReg = ac.reg;
  panelReg.textContent = ac.reg;
  panelSub.textContent = ac.type + (ac.name ? ' — ' + ac.name : '');
  panel.classList.add('open');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  loadPhotos(ac);
  // Highlight row/card
  document.querySelectorAll('tbody tr.selected-row').forEach(r => r.classList.remove('selected-row'));
  document.querySelectorAll('.aircraft-card.selected-card').forEach(c => c.classList.remove('selected-card'));
  document.querySelectorAll(`[data-reg="${ac.reg}"]`).forEach(el => {
    el.classList.add(el.tagName === 'TR' ? 'selected-row' : 'selected-card');
  });
}

function closePanel() {
  panel.classList.remove('open');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  selectedReg = null;
  document.querySelectorAll('.selected-row').forEach(r => r.classList.remove('selected-row'));
  document.querySelectorAll('.selected-card').forEach(c => c.classList.remove('selected-card'));
}

panelClose.addEventListener('click', closePanel);
overlay.addEventListener('click', closePanel);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

async function loadPhotos(ac) {
  // iframe içinde çalışıyorsak direkt Planespotters'a yönlendir
  const inIframe = window.self !== window.top;

  panelBody.innerHTML = `
    <div class="panel-loading">
      <div class="spinner"></div>
      <div class="panel-loading-text">FOTOĞRAF YÜKLENİYOR...</div>
    </div>`;

  if (inIframe) {
    // CORS engeli — fotoğrafları yeni sekmede aç
    const regClean = ac.reg.replace('-','');
    panelBody.innerHTML = buildInfoOnly(ac) + `
      <div style="padding:0 20px 20px">
        <a class="panel-link" href="https://www.planespotters.net/photos/reg/${ac.reg}" target="_blank" rel="noopener"
          style="display:flex;align-items:center;gap:10px;justify-content:center;padding:14px">
          📷 Fotoğrafları Planespotters'da Aç ↗
        </a>
        <a class="panel-link" href="https://www.planespotters.net/aircraft/${regClean}" target="_blank" rel="noopener"
          style="display:flex;align-items:center;gap:10px;justify-content:center;padding:14px;margin-top:8px">
          ✈ Uçak Detayları ↗
        </a>
      </div>`;
    return;
  }

  try {
    const url = `https://api.planespotters.net/pub/photos/reg/${encodeURIComponent(ac.reg)}`;
    const res = await fetch(url);
    const data = await res.json();
    currentPhotos = data.photos || [];
    activePhotoIdx = 0;
    renderPanel(ac);
  } catch(e) {
    panelBody.innerHTML = buildInfoOnly(ac) + `
      <div class="panel-no-photo">
        <div class="no-photo-icon">📡</div>
        <div>API'ye ulaşılamadı.<br>İnternet bağlantısını kontrol et.</div>
      </div>`;
  }
}

function renderPanel(ac) {
  const photo = currentPhotos[activePhotoIdx];

  let photoHTML = '';
  if (currentPhotos.length === 0) {
    photoHTML = `
      <div class="panel-no-photo" style="padding:40px 20px">
        <div class="no-photo-icon">✈</div>
        <div>Bu uçak için fotoğraf bulunamadı.</div>
      </div>`;
  } else {
    const imgSrc = photo.thumbnail_large?.src || photo.thumbnail?.src || '';
    const photographer = photo.photographer || '';
    const location = [photo.airport?.name, photo.airport?.country_name].filter(Boolean).join(', ');
    const date = photo.date_taken ? photo.date_taken.substring(0,10) : '';
    const photoUrl = photo.link || `https://www.planespotters.net/photo/${photo.id}`;

    photoHTML = `
      <div class="panel-photo-wrap">
        <img id="main-photo" src="${imgSrc}" alt="${ac.reg}" loading="lazy">
        <div class="panel-photo-credit">
          ${photographer ? `📷 ${photographer}` : ''}
          ${location ? ` · ${location}` : ''}
          ${date ? ` · ${date}` : ''}
          &nbsp;<a href="${photoUrl}" target="_blank" rel="noopener">Planespotters ↗</a>
        </div>
      </div>`;

    // Thumbnails if more than 1
    if (currentPhotos.length > 1) {
      const thumbs = currentPhotos.slice(0, 9).map((p, i) => {
        const tsrc = p.thumbnail?.src || '';
        return `<div class="photo-thumb ${i === activePhotoIdx ? 'active' : ''}" data-idx="${i}">
          <img src="${tsrc}" alt="" loading="lazy">
        </div>`;
      }).join('');
      photoHTML += `<div class="photo-grid">${thumbs}</div>`;
    }
  }

  panelBody.innerHTML = photoHTML + buildInfoOnly(ac) + `
    <a class="panel-link" href="https://www.planespotters.net/aircraft/${ac.reg.replace('-','')}" target="_blank" rel="noopener">
      ✈ Planespotters'da Görüntüle ↗
    </a>`;

  // Thumb click handlers
  panelBody.querySelectorAll('.photo-thumb').forEach(thumb => {
    thumb.addEventListener('click', () => {
      activePhotoIdx = parseInt(thumb.dataset.idx);
      renderPanel(ac);
    });
  });
}

function buildInfoOnly(ac) {
  const ageColor = ac.age > 15 ? '#e8a020' : ac.age < 2 ? '#5b9bd5' : 'var(--red)';
  return `
  <div class="panel-info">
    ${ac.name ? `<div class="panel-aircraft-name">${ac.name}</div>` : ''}
    <div class="panel-type">${ac.type}</div>
    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">Tescil</div>
        <div class="info-value red">${ac.reg}</div>
      </div>
      <div class="info-item">
        <div class="info-label">Yaş</div>
        <div class="info-value" style="color:${ageColor}">${ac.age > 0 ? ac.age.toFixed(1) + ' yıl' : ac.onOrder ? 'Sipariş' : '—'}</div>
      </div>
      <div class="info-item">
        <div class="info-label">Konfigürasyon</div>
        <div class="info-value">${ac.config || '—'}</div>
      </div>
      <div class="info-item">
        <div class="info-label">Teslim</div>
        <div class="info-value">${ac.delivered || '—'}</div>
      </div>
      ${ac.remark ? `
      <div class="info-item" style="grid-column:1/-1">
        <div class="info-label">Açıklama</div>
        <div class="info-value" style="font-size:11px;color:var(--muted)">${ac.remark}</div>
      </div>` : ''}
    </div>
  </div>`;
}

render();

// Sayfa açılınca arka planda Firebase sync — 1sn gecikmeyle
setTimeout(() => {
  if (typeof firebaseSync === 'function') firebaseSync();
}, 1000);
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, setDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAsmUd--2RURsBSv2qmMiTa0TnIcCmfaEk",
  authDomain: "mx-hub-36e72.firebaseapp.com",
  databaseURL: "https://mx-hub-36e72-default-rtdb.firebaseio.com",
  projectId: "mx-hub-36e72",
  storageBucket: "mx-hub-36e72.firebasestorage.app",
  messagingSenderId: "427067393430",
  appId: "1:427067393430:web:99fd4abe2a0788015889b7"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);

function showToast(msg, type = 'info') {
  let toast = document.getElementById('fb-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'fb-toast';
    toast.style.cssText = `
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
      background:#1a1a1a; border:1px solid #333; border-left:3px solid #E31837;
      color:#e8e8e8; padding:10px 20px; border-radius:4px;
      font-family:'IBM Plex Mono',monospace; font-size:12px;
      z-index:9999; transition:transform 0.3s; white-space:nowrap;
      box-shadow:0 4px 20px rgba(0,0,0,0.5);
    `;
    document.body.appendChild(toast);
  }
  const colors = { info:'#5b9bd5', success:'#4caf7d', warn:'#e8a020', error:'#E31837' };
  toast.style.borderLeftColor = colors[type] || '#E31837';
  toast.textContent = msg;
  toast.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => {
    toast.style.transform = 'translateX(-50%) translateY(80px)';
  }, 3500);
}

async function syncFromFirebase() {
  try {
    const snap = await getDocs(collection(db, 'thy_fleet'));
    if (snap.empty) {
      await uploadToFirebase();
      return;
    }
    const fbData = snap.docs.map(d => d.data());
    let updated = 0;
    fbData.forEach(fbAc => {
      const local = window.fleetData.find(a => a.reg === fbAc.reg);
      if (!local) {
        window.fleetData.push(fbAc);
        updated++;
      } else {
        const changed = ['type','config','delivered','remark','name','age']
          .some(k => fbAc[k] !== undefined && fbAc[k] !== local[k]);
        if (changed) { Object.assign(local, fbAc); updated++; }
      }
    });
    if (updated > 0) {
      window.render();
      showToast(`✈ ${updated} uçak güncellendi`, 'success');
    }
  } catch(e) {
    console.warn('Firebase sync:', e.message);
  }
}

async function uploadToFirebase() {
  try {
    showToast('⬆ Firestore\'a yükleniyor...', 'warn');
    let count = 0;
    for (const ac of window.fleetData) {
      if (ac.onOrder || !ac.reg || ac.reg === 'TC-') continue;
      await setDoc(doc(db, 'thy_fleet', ac.reg.replace(/[-\s]/g,'')), {
        ...ac, _updated: serverTimestamp()
      });
      count++;
    }
    showToast(`✓ ${count} uçak Firestore'a yüklendi`, 'success');
  } catch(e) {
    console.warn('Firebase upload:', e.message);
  }
}

// Global'e bağla
window.firebaseSync = syncFromFirebase;

// Hemen başlat
setTimeout(syncFromFirebase, 1500);
</script>
</body>
